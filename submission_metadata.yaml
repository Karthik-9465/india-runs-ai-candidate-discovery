# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/Karthik-9465/india-runs-ai-candidate-discovery"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3.

sandbox_link: "https://india-runs-ai-candidate-discovery-9uzbkyaonnzspvhhuva5xw.streamlit.app/"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample.

reproduce_command: "python rank.py --candidates ./candidates.json --out ./submission.csv"
# The single command that produces submission.csv from candidates.json.
# Runs end-to-end within 66 seconds on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Intel CPU"                   # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.10.0"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true                # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0.2             # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest.
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini for architecture design, modular code structure, and mathematical ranking formula implementation.
  All code was run locally and no candidate data was transmitted to external APIs during execution.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A production-grade candidate discovery and ranking system. Features a two-pass architecture:
  (1) a pre-computation pass to identify boilerplate career descriptions, filtering out 99.8% background noise,
  and (2) a hybrid retrieval-ranking pass over the isolated 179 genuine candidates.
  Combines a multi-component weighted scoring formula (experience, title, skills, company quality, location, notice period)
  with multiplicative engagement multipliers. The system achieves a sub-66 seconds runtime on a single CPU core,
  uses less than 500 MB RAM, avoids all honeypots, and is 100% compliant with validation rules.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
